<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>金額ルーレット 音声完全版</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.card{
  background:#1c1c1c;
  padding:24px;
  border-radius:20px;
  text-align:center;
  width:min(700px,95%);
}

button{
  padding:14px 18px;
  font-size:16px;
  border-radius:14px;
  border:1px solid #666;
  background:#222;
  color:#fff;
  min-width:120px;
  margin:6px;
  cursor:pointer;
  -webkit-user-select:none;
  user-select:none;
  touch-action:manipulation;
}

button.primary{
  border-color:#ffd700;
  color:#ffd700;
}

input{
  padding:14px;
  font-size:22px;
  text-align:center;
  border-radius:14px;
  border:1px solid #666;
  background:#000;
  color:#fff;
  width:80%;
}

.price{
  font-size:64px;
  color:#ffd700;
  margin:20px 0;
}
</style>
</head>

<body>

<div class="card">

<h2>金額セット</h2>
<input id="amount" value="5000" inputmode="numeric">

<div>
<button class="primary" data-add="500">+500</button>
<button class="primary" data-add="1000">+1000</button>
<button class="primary" data-add="5000">+5000</button>
</div>

<hr style="margin:20px 0;border-color:#333;">

<h2>ルーレット</h2>
<div class="price" id="price">¥0</div>

<button class="primary" id="start">START</button>

</div>

<script>
const amountInput = document.getElementById("amount");
const priceEl = document.getElementById("price");
const startBtn = document.getElementById("start");

/* ---- 音声（確実版） ---- */
function speak(text){
  if(!("speechSynthesis" in window)) return;

  speechSynthesis.cancel();

  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang = "ja-JP";
  uttr.rate = 1.05;
  uttr.pitch = 1.1;

  speechSynthesis.speak(uttr);
}

/* iOS対策：最初のタップで必ず有効化 */
document.addEventListener("click", () => {
  speechSynthesis.cancel();
}, { once:true });

/* ---- 金額加算 ---- */
document.querySelectorAll("[data-add]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    let val = parseInt(amountInput.value.replace(/[^0-9]/g,"")||0);
    val += parseInt(btn.dataset.add);
    amountInput.value = val;
  });
});

/* ---- ルーレット ---- */
startBtn.addEventListener("click", ()=>{

  let target = parseInt(amountInput.value.replace(/[^0-9]/g,"")||0);

  let current = 0;
  let interval = setInterval(()=>{
    current = Math.floor(Math.random()*target);
    priceEl.textContent = "¥" + current.toLocaleString();
  },60);

  setTimeout(()=>{
    clearInterval(interval);
    priceEl.textContent = "¥" + target.toLocaleString();

    /* ★ここで必ずしゃべる */
    speak(target.toLocaleString() + "円");

  },2000);

});
</script>

</body>
</html>
